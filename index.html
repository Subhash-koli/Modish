      <!-- Schema 3: FAQPage (enables Google rich results) -->
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is your minimum order quantity (MOQ)?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Our MOQ varies by product. For custom T-Shirts (Round Neck, Oversized, Polo), our MOQ is 25 pieces. For Hoodies, it's 15 pieces. For Tote Bags and Accessories, it's 50 pieces. For Corporate Diaries, it's 25 pieces. We're flexible — contact us to discuss smaller quantities."
            }
          },
          {
            "@type": "Question",
            "name": "Do you provide design mockups before production?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Absolutely. Every order comes with a free digital mockup before we go into production. You'll see exactly how your print will look on the garment — colors, placement, sizing — and we won't start until you're 100% satisfied with the preview."
            }
          },
          {
            "@type": "Question",
            "name": "How does the bulk ordering process work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It's simple: Share your design → receive a mockup within 24 hours → approve or revise → confirm the order and quantity → production begins. We'll keep you updated throughout and dispatch with tracking information."
            }
          },
          {
            "@type": "Question",
            "name": "What are your delivery timelines?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Standard production + delivery takes 7–12 working days after design approval. For urgent orders, we offer an expedited 4–5 day turnaround (subject to capacity). Large bulk orders (1000+) may require 14–18 working days."
            }
          },
          {
            "@type": "Question",
            "name": "What printing methods do you offer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We offer four printing technologies: DTF (Direct to Film) for vibrant multicolor designs, Screen Printing for bulk single-color runs, Embroidery for premium workwear and caps, and Sublimation for all-over prints on polyester."
            }
          },
          {
            "@type": "Question",
            "name": "How is pricing determined?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Pricing depends on the product type, quantity, number of print colors, and printing method. Generally, the higher the quantity, the lower the per-piece cost. We provide transparent, itemized quotes — no hidden charges or surprise fees."
            }
          },
          {
            "@type": "Question",
            "name": "Can I customize colors, sizes, and print placements?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, fully. We offer custom colors (subject to stock availability), all standard sizes from S to 3XL, and multiple print placements — front, back, sleeve, chest pocket."
            }
          },
          {
            "@type": "Question",
            "name": "What is your return or replacement policy?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We don't accept returns on custom printed items due to their personalized nature. However, if there's a quality defect — print error, wrong size, damaged item — we'll replace it at no cost to you."
            }
          }
        ]
      }
